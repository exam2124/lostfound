<!-- core/templates/core/base.html -->
<!-- This is the SHARED layout used by all other pages -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Lost & Found{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --success-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --dark: #0f172a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-family);
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* ── Top Navigation Bar ── */
    nav {
      background: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid var(--gray-200);
    }
    .nav-brand { 
      font-size: 1.25rem; 
      font-weight: 700; 
      letter-spacing: -0.025em; 
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-right  { display: flex; align-items: center; gap: 1.25rem; }
    .nav-right span { font-size: 0.875rem; color: var(--gray-500); font-weight: 500; }
    .nav-right a {
      color: var(--gray-700); 
      text-decoration: none;
      font-size: 0.875rem; 
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      transition: var(--transition);
      background: var(--gray-100);
    }
    .nav-right a:hover { 
      background: var(--gray-200); 
      color: var(--gray-900); 
    }

    /* ── Flash Messages ── */
    .messages-container { max-width: 1280px; margin: 1.5rem auto 0; padding: 0 2rem; }
    .messages-container ul { list-style: none; }
    .messages-container li {
      padding: 1rem 1.25rem;
      border-radius: var(--radius-md);
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow-sm);
    }
    .messages-container .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
    .messages-container .error   { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

    /* ── Main Content Area ── */
    main { padding: 2rem; max-width: 1280px; margin: 0 auto; }

    /* ── Reusable Button Styles ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.625rem 1.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      gap: 0.5rem;
    }
    .btn:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.3);
    }
    .btn:active { transform: scale(0.98); }
    
    .btn-red   { background: var(--danger); color: white; box-shadow: var(--shadow-sm); }
    .btn-red:hover { background: var(--danger-hover); box-shadow: var(--shadow-md); }
    
    .btn-green { background: var(--success); color: white; box-shadow: var(--shadow-sm); }
    .btn-green:hover { background: var(--success-hover); box-shadow: var(--shadow-md); }
    
    .btn-blue  { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
    .btn-blue:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
    
    .btn-dark  { background: var(--gray-900); color: white; box-shadow: var(--shadow-sm); }
    .btn-dark:hover { background: var(--gray-700); box-shadow: var(--shadow-md); }

    .btn-outline { background: transparent; color: var(--gray-700); border-color: var(--gray-300); }
    .btn-outline:hover { background: var(--gray-100); color: var(--gray-900); }

    /* ── Modal Overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Modal Box ── */
    .modal {
      background: white;
      padding: 2rem;
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 32rem;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.05);
      animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalSlideUp {
      from { transform: translateY(20px) scale(0.98); opacity: 0; }
      to   { transform: translateY(0) scale(1);       opacity: 1; }
    }
    .modal h2 { 
      margin-bottom: 1.5rem; 
      font-size: 1.25rem; 
      font-weight: 700; 
      color: var(--gray-900); 
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .close-btn {
      position: absolute; top: 1.25rem; right: 1.25rem;
      background: var(--gray-100); border: none;
      width: 2rem; height: 2rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer; color: var(--gray-500);
      transition: var(--transition);
    }
    .close-btn:hover { background: var(--gray-200); color: var(--gray-900); }

    /* ── Form Fields inside Modal ── */
    .form-group          { margin-bottom: 1.25rem; }
    .form-group label    { 
      display: block; 
      margin-bottom: 0.375rem; 
      font-weight: 500; 
      font-size: 0.875rem; 
      color: var(--gray-700); 
    }
    .form-group input,
    .form-group textarea,
    .form-group select   {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--gray-900);
      background-color: white;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--gray-400); }
    
    .form-group input:focus,
    .form-group textarea:focus { 
      outline: none; 
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 5rem; }
    
    .form-group input[type="file"] {
      padding: 0.5rem;
      background: var(--gray-50);
      border: 1px dashed var(--gray-300);
      cursor: pointer;
    }
    .form-group input[type="file"]::file-selector-button {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gray-700);
      margin-right: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .form-group input[type="file"]::file-selector-button:hover {
      background: var(--gray-200);
    }
  </style>
</head>
<body>

<!-- Show navbar only when user is logged in -->
{% if user.is_authenticated %}
<nav>
  <span class="nav-brand">🔍 Lost & Found</span>
  <div class="nav-right">
    <span>👋 {{ user.username }}</span>
    <a href="{% url 'logout' %}">Logout</a>
  </div>
</nav>
{% endif %}

<!-- Flash messages (success/error notifications) -->
{% if messages %}
<div class="messages-container">
  <ul>
    {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}

<!-- Main page content goes here -->
<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
