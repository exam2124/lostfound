<!-- core/templates/core/login.html -->
{% extends 'core/base.html' %}
{% block title %}Login — Lost & Found{% endblock %}

{% block content %}
<style>
  /* ── Auth Card (used for login and signup) ── */
  .auth-wrapper {
    min-height: 85vh;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-card {
    background: white;
    padding: 44px 40px;
    border-radius: 18px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 420px;
  }
  .auth-card .logo { text-align: center; font-size: 2.8rem; margin-bottom: 6px; }
  .auth-card h1    { text-align: center; font-size: 1.6rem; color: #1a1a2e; margin-bottom: 4px; }
  .auth-card .sub  { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }

  .auth-input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 14px;
    border: 1.5px solid #ddd;
    border-radius: 9px;
    font-size: 1rem;
    transition: border-color 0.2s;
  }
  .auth-input:focus { outline: none; border-color: #2980b9; }

  .auth-submit {
    width: 100%;
    padding: 13px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 9px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .auth-submit:hover { background: #2980b9; }

  .auth-footer {
    text-align: center;
    margin-top: 18px;
    font-size: 0.9rem;
    color: #666;
  }
  .auth-footer a { color: #2980b9; font-weight: 600; text-decoration: none; }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">🔍</div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your Lost & Found account</p>

    <!-- Login Form — method POST sends data securely -->
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %} <!-- Security token required by Django -->
      <input class="auth-input" type="text"     name="username" placeholder="Username"  required autofocus />
      <input class="auth-input" type="password" name="password" placeholder="Password"  required />
      <button class="auth-submit" type="submit">Sign In →</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </p>
  </div>
</div>
{% endblock %}
