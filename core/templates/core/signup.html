<!-- core/templates/core/signup.html -->
{% extends 'core/base.html' %}
{% block title %}Sign Up — Lost & Found{% endblock %}

{% block content %}
<style>
  /* ── Auth Card (used for login and signup) ── */
  .auth-wrapper {
    min-height: 85vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .auth-card {
    background: white;
    padding: 3rem 2.5rem;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.05);
    width: 100%;
    max-width: 440px;
    animation: fadeIn 0.4s ease-out;
  }
  .auth-card .logo { text-align: center; font-size: 3rem; margin-bottom: 0.5rem; }
  .auth-card h1    { text-align: center; font-size: 1.75rem; color: var(--gray-900); font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.25rem; }
  .auth-card .sub  { text-align: center; color: var(--gray-500); font-size: 0.9375rem; margin-bottom: 2rem; }

  .auth-input {
    width: 100%;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    border: 1px solid var(--gray-300);
    border-radius: var(--radius-md);
    font-size: 1rem;
    color: var(--gray-900);
    background-color: white;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
  }
  .auth-input::placeholder { color: var(--gray-400); }
  .auth-input:focus { outline: none; border-color: var(--success); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }

  .auth-submit {
    width: 100%;
    padding: 0.875rem;
    background: var(--success);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 0.5rem;
    box-shadow: var(--shadow-sm);
  }
  .auth-submit:hover { background: var(--success-hover); box-shadow: var(--shadow-md); transform: translateY(-1px); }

  .auth-footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.9375rem;
    color: var(--gray-500);
  }
  .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; transition: var(--transition); }
  .auth-footer a:hover { color: var(--primary-hover); text-decoration: underline; }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">🎒</div>
    <h1>Create Account</h1>
    <p class="sub">Join the Campus Lost & Found system</p>

    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}
      <input class="auth-input" type="text"     name="username"         placeholder="Choose a Username"  required autofocus />
      <input class="auth-input" type="email"    name="email"            placeholder="Email Address"       required />
      <input class="auth-input" type="password" name="password"         placeholder="Create Password"     required />
      <input class="auth-input" type="password" name="confirm_password" placeholder="Confirm Password"    required />
      <button class="auth-submit" type="submit">Create Account →</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
